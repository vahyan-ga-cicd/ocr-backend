service: ocr-backend

provider:
  name: aws
  runtime: python3.9 # Still used as a reference
  stage: prod
  region: ap-south-1
  memorySize: 2048
  timeout: 30
  ecr:
    # This tells Serverless to build the image from the local Dockerfile
    images:
      appimage:
        path: ./

functions:
  api:
    image:
      command:
        - app.main.handler
      name: appimage
    events:
      - http:
          path: /
          method: any
          cors: true
      - http:
          path: /{proxy+}
          method: any
          cors: true

# No plugins needed for Docker-based deployment
# No custom pythonRequirements needed
